<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none" role="img" aria-label="Amir Tadrisi — LMS engineer since 2013, Cubite founder. 50+ deployments, 400K learners.">
  <rect width="1280" height="320" fill="#FFFFFF"/>

  <!-- Eyebrow (navy) -->
  <circle cx="64" cy="58" r="3" fill="#0B1626"/>
  <text x="78" y="62" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="3.5" fill="#0B1626">LMS ENGINEER SINCE 2013  ·  CUBITE FOUNDER</text>

  <!-- Name -->
  <text x="64" y="166" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2.5" fill="#0B1626">Amir Tadrisi</text>

  <!-- Career arc — THE one cyan element -->
  <line x1="64" y1="208" x2="1216" y2="208" stroke="#0B1626" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="64" y1="208" x2="1160" y2="208" stroke="#0891B2" stroke-width="2"/>

  <!-- Milestone 1: 50+ DEPLOYMENTS -->
  <circle cx="860" cy="208" r="5" fill="#0891B2"/>
  <text x="860" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#0B1626" text-anchor="middle" letter-spacing="-1">50+</text>
  <text x="860" y="278" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0B1626" fill-opacity="0.55" text-anchor="middle">DEPLOYMENTS</text>

  <!-- Milestone 2: 400K LEARNERS -->
  <circle cx="1160" cy="208" r="5" fill="#0891B2"/>
  <text x="1160" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#0B1626" text-anchor="middle" letter-spacing="-1">400K</text>
  <text x="1160" y="278" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#0B1626" fill-opacity="0.55" text-anchor="middle">LEARNERS</text>

  <!-- Tagline -->
  <text x="64" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#0B1626" fill-opacity="0.6">Open edX  ·  Moodle  ·  Canvas LTI</text>
</svg>
