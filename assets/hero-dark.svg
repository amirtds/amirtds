<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none" role="img" aria-label="Amir Tadrisi — LMS engineer, 13 years deep. Founder of Cubite. 13 years, 50+ deployments, 400K learners.">
  <rect width="1280" height="320" fill="#0B1626"/>

  <!-- Top eyebrow label -->
  <circle cx="64" cy="58" r="3.5" fill="#22D3EE"/>
  <text x="80" y="62" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="3.5" fill="#22D3EE">LMS ENGINEER  ·  CUBITE FOUNDER</text>

  <!-- Main name (large editorial type) -->
  <text x="64" y="166" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2.5" fill="#FFFFFF">Amir Tadrisi</text>

  <!-- Career arc baseline (faded) -->
  <line x1="64" y1="208" x2="1216" y2="208" stroke="#1E3A5F" stroke-width="1"/>
  <!-- Career arc progress (cyan) -->
  <line x1="64" y1="208" x2="1160" y2="208" stroke="#22D3EE" stroke-width="2"/>

  <!-- Stat 1: 13 YEARS -->
  <circle cx="760" cy="208" r="7" fill="#0B1626" stroke="#22D3EE" stroke-width="2.5"/>
  <circle cx="760" cy="208" r="3" fill="#22D3EE"/>
  <text x="760" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">13</text>
  <text x="760" y="276" font-family="ui-sans-serif, sans-serif" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64748B" text-anchor="middle">YEARS</text>

  <!-- Stat 2: 50+ DEPLOYMENTS -->
  <circle cx="960" cy="208" r="7" fill="#0B1626" stroke="#22D3EE" stroke-width="2.5"/>
  <circle cx="960" cy="208" r="3" fill="#22D3EE"/>
  <text x="960" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">50+</text>
  <text x="960" y="276" font-family="ui-sans-serif, sans-serif" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64748B" text-anchor="middle">DEPLOYMENTS</text>

  <!-- Stat 3: 400K LEARNERS -->
  <circle cx="1160" cy="208" r="7" fill="#0B1626" stroke="#22D3EE" stroke-width="2.5"/>
  <circle cx="1160" cy="208" r="3" fill="#22D3EE"/>
  <text x="1160" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">400K</text>
  <text x="1160" y="276" font-family="ui-sans-serif, sans-serif" font-size="10" font-weight="700" letter-spacing="2.5" fill="#64748B" text-anchor="middle">LEARNERS</text>

  <!-- Tagline (bottom-left under name) -->
  <text x="64" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#94A3B8">Open edX  ·  Moodle  ·  Canvas LTI</text>
</svg>
