<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none" role="img" aria-label="LMS engineer since 2013. Cubite founder. 50+ deployments, 400K learners.">
  <rect width="1280" height="320" fill="#0B1626"/>

  <!-- Headline line 1 -->
  <text x="64" y="118" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="-1.5" fill="#FFFFFF">LMS engineer since 2013.</text>

  <!-- Headline line 2 -->
  <text x="64" y="172" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="-1.5" fill="#FFFFFF">Cubite founder.</text>

  <!-- Career arc — THE one cyan element -->
  <line x1="64" y1="208" x2="1216" y2="208" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="64" y1="208" x2="1160" y2="208" stroke="#22D3EE" stroke-width="2"/>

  <!-- Milestone 1: 50+ DEPLOYMENTS -->
  <circle cx="860" cy="208" r="5" fill="#22D3EE"/>
  <text x="860" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">50+</text>
  <text x="860" y="278" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#FFFFFF" fill-opacity="0.55" text-anchor="middle">DEPLOYMENTS</text>

  <!-- Milestone 2: 400K LEARNERS -->
  <circle cx="1160" cy="208" r="5" fill="#22D3EE"/>
  <text x="1160" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">400K</text>
  <text x="1160" y="278" font-family="ui-sans-serif, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#FFFFFF" fill-opacity="0.55" text-anchor="middle">LEARNERS</text>

  <!-- Tagline -->
  <text x="64" y="252" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" fill-opacity="0.6">Open edX  ·  Moodle  ·  Canvas LTI</text>
</svg>
